<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Karaoke</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<h1>Random Karaoke</h1>
<p class="subtitle">Randomly pick a Billboard Hot 100 song. Use Lyric Video mode for song guessing or Karaoke for singing.</p>
<div class="controls">
    <div class="control-group row">
        <div class="field">
            <label for="yearFrom">Year From</label>
            <input type="number" id="yearFrom" min="2006" max="2023" value="2006">
        </div>
        <div class="field">
            <label for="yearTo">Year To</label>
            <input type="number" id="yearTo" min="2006" max="2023" value="2023">
        </div>
    </div>
    <div class="control-group row">
        <div class="field">
            <label for="topX">Top X Songs</label>
            <input type="number" id="topX" min="1" max="100" value="5">
        </div>
        <div class="field">
            <label for="skipY">Skip Top Y</label>
            <input type="number" id="skipY" min="0" max="100" value="0">
        </div>
    </div>
    <div class="field">
        <label for="preset">Preset</label>
        <select id="preset">
            <option value="beginner">Beginner</option>
            <option value="easy">Easy</option>
            <option value="medium">Medium</option>
            <option value="hard">Hard</option>
            <option value="extraHard">Extra Hard</option>
            <option value="songGuru">Song Guru</option>
        </select>
    </div>
    <div class="toggle-row">
        <label class="switch">
            <input type="checkbox" id="videoType" checked>
            <span class="slider"></span>
        </label>
        <span id="videoMode">Karaoke Mode</span>
    </div>
    <button id="randomBtn">Random Song</button>
</div>
<div id="songDisplay"></div>
<script src="app.js"></script>
</body>
</html>
