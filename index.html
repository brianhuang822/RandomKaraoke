<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Karaoke</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="bg-glow bg-glow-1"></div>
<div class="bg-glow bg-glow-2"></div>

<header>
    <h1>Random Karaoke</h1>
    <p class="subtitle">Pick a random Billboard Hot 100 hit. Lyric Video for guessing, Karaoke for singing.</p>
</header>

<main>
    <div class="card controls">
        <div class="section-label">Difficulty</div>
        <div class="preset-pills" id="presetPills">
            <button class="pill active" data-value="beginner">Beginner</button>
            <button class="pill" data-value="easy">Easy</button>
            <button class="pill" data-value="medium">Medium</button>
            <button class="pill" data-value="hard">Hard</button>
            <button class="pill" data-value="extraHard">Extra Hard</button>
            <button class="pill" data-value="songGuru">Guru</button>
        </div>

        <div class="divider"></div>

        <div class="section-label">Year Range</div>
        <div class="control-row">
            <div class="field">
                <label for="yearFrom">From</label>
                <input type="number" id="yearFrom" min="2006" max="2023" value="2006">
            </div>
            <span class="range-dash">&ndash;</span>
            <div class="field">
                <label for="yearTo">To</label>
                <input type="number" id="yearTo" min="2006" max="2023" value="2023">
            </div>
        </div>

        <div class="control-row">
            <div class="field">
                <label for="topX">Pool Size</label>
                <input type="number" id="topX" min="1" max="100" value="5">
            </div>
            <div class="field">
                <label for="skipY">Skip Top</label>
                <input type="number" id="skipY" min="0" max="100" value="0">
            </div>
        </div>

        <div class="divider"></div>

        <div class="toggle-row">
            <div class="toggle-info">
                <span class="section-label" style="margin-bottom:0">Mode</span>
                <span id="videoMode" class="mode-badge">Karaoke</span>
            </div>
            <label class="switch">
                <input type="checkbox" id="videoType" checked>
                <span class="slider"></span>
            </label>
        </div>

        <button id="randomBtn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 3 21 3 21 8"></polyline><line x1="4" y1="20" x2="21" y2="3"></line><polyline points="21 16 21 21 16 21"></polyline><line x1="15" y1="15" x2="21" y2="21"></line><line x1="4" y1="4" x2="9" y2="9"></line></svg>
            Shuffle Song
        </button>
    </div>

    <div id="songDisplay"></div>
</main>

<script src="app.js"></script>
</body>
</html>
